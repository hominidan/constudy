<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      background: #fff;
    }

    .frame {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    id="surveyFrame"
    class="frame"
    scrolling="yes"
    allow="fullscreen"
    referrerpolicy="no-referrer"
  ></iframe>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyY_XgxRaO0a3aGaWzM50o-OLmbP6m4ejH67Z0al4XdKQOf0WKQwUOeWm9BS_TsZGQmag/exec";

    // Forward any Prolific parameters from the GitHub Pages URL to the Apps Script app.
    // This keeps testing possible with no query params, while live Prolific runs will carry
    // PROLIFIC_PID, STUDY_ID, and SESSION_ID straight into the survey.
    const frame = document.getElementById("surveyFrame");
    frame.src = APP_URL + window.location.search;

    function fit() {
      frame.style.height = window.innerHeight + "px";
    }

    window.addEventListener("resize", fit);
    fit();
  </script>
</body>
</html>
